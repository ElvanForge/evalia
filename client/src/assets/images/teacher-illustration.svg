<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <!-- Background Elements -->
  <rect x="50" y="50" width="300" height="200" rx="20" fill="#f8f9fa" />
  
  <!-- Teacher Figure (Simplified) -->
  <circle cx="200" cy="110" r="40" fill="#0ba2b0" opacity="0.9" />
  <rect x="180" y="150" width="40" height="80" rx="10" fill="#0ba2b0" opacity="0.8" />
  
  <!-- Classroom Board -->
  <rect x="100" y="80" width="200" height="120" rx="5" fill="#ffffff" stroke="#0ba2b0" stroke-width="2" />
  
  <!-- Chart Elements -->
  <rect x="120" y="100" width="20" height="80" fill="#0ba2b0" opacity="0.7" />
  <rect x="150" y="120" width="20" height="60" fill="#0ba2b0" opacity="0.8" />
  <rect x="180" y="90" width="20" height="90" fill="#0ba2b0" opacity="0.9" />
  <rect x="210" y="130" width="20" height="50" fill="#0ba2b0" opacity="0.7" />
  <rect x="240" y="110" width="20" height="70" fill="#0ba2b0" opacity="0.8" />
  
  <!-- Grade "A" Symbol -->
  <text x="280" y="120" font-family="Arial" font-size="24" font-weight="bold" fill="#0ba2b0">A</text>
</svg>