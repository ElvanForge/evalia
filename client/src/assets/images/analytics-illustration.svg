<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <!-- Background -->
  <rect x="50" y="50" width="300" height="200" rx="20" fill="#f8f9fa" />
  
  <!-- Dashboard elements -->
  <rect x="80" y="70" width="240" height="160" rx="5" fill="#ffffff" stroke="#0ba2b0" stroke-width="2" />
  
  <!-- Charts and graphs -->
  <!-- Pie chart -->
  <circle cx="140" cy="130" r="40" fill="none" stroke="#0ba2b0" stroke-width="2" />
  <path d="M140,130 L140,90 A40,40 0 0,1 174.14,150 z" fill="#0ba2b0" opacity="0.8" />
  
  <!-- Bar chart -->
  <rect x="210" y="100" width="20" height="80" fill="#0ba2b0" opacity="0.7" />
  <rect x="240" y="120" width="20" height="60" fill="#0ba2b0" opacity="0.8" />
  <rect x="270" y="90" width="20" height="90" fill="#0ba2b0" opacity="0.9" />
  
  <!-- Data labels -->
  <rect x="100" y="190" width="60" height="10" rx="2" fill="#0ba2b0" opacity="0.6" />
  <rect x="180" y="190" width="100" height="10" rx="2" fill="#0ba2b0" opacity="0.6" />
  
  <!-- Stats indicators -->
  <path d="M110,90 L130,80 L150,95 L170,75 L190,85" fill="none" stroke="#0ba2b0" stroke-width="2" />
  <circle cx="190" cy="85" r="4" fill="#0ba2b0" />
</svg>