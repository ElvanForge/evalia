<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Circular background -->
  <circle cx="50" cy="50" r="45" fill="#ffffff" stroke="#0ba2b0" stroke-width="2" />
  
  <!-- Stylized E shape - checkmark combination -->
